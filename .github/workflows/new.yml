name: Testing

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: data-sync-worker
  cancel-in-progress: false

jobs:
  run-linux:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: 'utf-8'
    defaults:
      run:
        shell: bash
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout Private Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Check Skip Job
        id: check_skip
        env:
          SKIP_JOB_ENV: ${{ vars.SKIP_JOB }}
        run: |
          should_skip="false"
          
          # Check .env file if it exists
          if [ -f .env ]; then
            if grep -q "SKIP_JOB=true" .env; then
              should_skip="true"
            fi
          fi
          
          # Check environment variable (GitHub Variable)
          if [ "$SKIP_JOB_ENV" == "true" ]; then
            should_skip="true"
          fi
          
          echo "should_skip=$should_skip" >> $GITHUB_OUTPUT
          if [ "$should_skip" == "true" ]; then
            echo "⚠️ Job is configured to be skipped."
          fi

      - name: Check pause window
        if: steps.check_skip.outputs.should_skip != 'true'
        id: checkpause
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          python - <<'PY'
          import os, time, requests
          def get_var(token, owner, repo, name):
              url = f"https://api.github.com/repos/{owner}/{repo}/actions/variables/{name}"
              r = requests.get(url, headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"})
              if r.status_code == 200:
                  return r.json().get('value')
              return None
          token = os.environ['GH_TOKEN']
          owner, repo = os.environ['GITHUB_REPOSITORY'].split('/')
          v = get_var(token, owner, repo, 'PAUSE_UNTIL')
          now = int(time.time())
          paused = 'false'
          try:
              if v and int(v) > now:
                  paused = 'true'
          except Exception:
              paused = 'false'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'paused={paused}\n')
          PY

      - name: Write auth_state.json from secret
        if: steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true'
        env:
          AUTH_STATE_JSON: ${{ secrets.AUTH_STATE_JSON }}
        run: |
          echo "$AUTH_STATE_JSON" > auth_state.json

      - name: Restore & Decrypt Persistent Data & Profile Cache
        if: steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true'
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            worker_data.json.gpg
            playwright_user_data.zip.gpg
          key: persistent-data-v1-${{ github.run_number }}
          restore-keys: |
            persistent-data-v1-

      - name: Decrypt Data
        if: steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true'
        run: |
          if [ -f worker_data.json.gpg ]; then
            gpg --quiet --batch --yes --decrypt --passphrase "$GPG_PASSPHRASE" \
            --output worker_data.json worker_data.json.gpg
            echo "✅ Decrypted persistent data"
          else
            echo "ℹ️ No encrypted data file found - starting fresh config"
          fi
          
          if [ -f playwright_user_data.zip.gpg ]; then
            gpg --quiet --batch --yes --decrypt --passphrase "$GPG_PASSPHRASE" \
            --output playwright_user_data.zip playwright_user_data.zip.gpg
            unzip -q playwright_user_data.zip
            echo "✅ Decrypted and restored browser profile"
          else
            echo "ℹ️ No encrypted browser profile found - starting cold browser"
          fi
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Run Worker Script
        if: steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true'
        id: run_worker
        env:
          # Only set CI-specific variables and secrets - let .env control the rest
          AUTH_STATE_FILE: '${{ github.workspace }}/auth_state.json'
          PROXY_IP: ${{ secrets.PROXY_IP }}
          BROWSER_REGION: ${{ secrets.BROWSER_REGION }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
          LOGS_WEBHOOK_URL: ${{ secrets.LOGS_WEBHOOK_URL }}
          GOOGLE_AUTH_SECRET: ${{ secrets.GOOGLE_AUTH_SECRET }}
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          PYTHONUNBUFFERED: 1
          PYTHONIOENCODING: 'utf-8'
          GITHUB_ACTIONS: true
        run: |
          python notorious.py || true

      - name: Parse run status
        if: steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true'
        id: parse
        run: |
          python - <<'PY'
          import json, os
          p = 'run_status.json'
          if not os.path.exists(p):
              print('status=none')
              print('reason=none')
              print('wait_hours=0')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('status=none\nreason=none\nwait_hours=0\n')
          else:
              d = json.load(open(p))
              status = (d.get('status') or 'none')
              reason = (d.get('reason') or 'none')
              wait_hours = str(d.get('wait_hours') or 0)
              print(f'status={status}')
              print(f'reason={reason}')
              print(f'wait_hours={wait_hours}')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f'status={status}\nreason={reason}\nwait_hours={wait_hours}\n')
          PY




      - name: Update pause window (limited)
        if: steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true' && steps.parse.outputs.status == 'limited_sleep'
        env:
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          python - <<'PY'
          import os, time, requests
          def set_var(token, owner, repo, name, value):
              url = f"https://api.github.com/repos/{owner}/{repo}/actions/variables/{name}"
              h = {"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"}
              r = requests.patch(url, headers=h, json={"name": name, "value": value})
              if r.status_code == 404:
                  url2 = f"https://api.github.com/repos/{owner}/{repo}/actions/variables"
                  requests.post(url2, headers=h, json={"name": name, "value": value})
          token = os.environ['GH_TOKEN']
          owner, repo = os.environ['GITHUB_REPOSITORY'].split('/')
          hours = float('${{ steps.parse.outputs.wait_hours }}' or '12')
          pause_until = str(int(time.time()) + int(hours * 3600))
          set_var(token, owner, repo, 'PAUSE_UNTIL', pause_until)
          print(f'✅ PAUSE_UNTIL set to {pause_until} ({hours}h from now)')
          PY
      - name: Encrypt & Save Cache
        if: steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true'
        id: encrypt_cache
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -f worker_data.json ]; then
            gpg --quiet --batch --yes --symmetric --passphrase "$GPG_PASSPHRASE" \
            --output worker_data.json.gpg worker_data.json
            echo "✅ Encrypted worker_data.json"
          fi

          if [ -d playwright_user_data ]; then
            python - <<'PY'
          import zipfile, os, pathlib
          src = pathlib.Path('playwright_user_data')
          with zipfile.ZipFile('playwright_user_data.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              for f in src.rglob('*'):
                  zf.write(f, f.relative_to(src.parent))
          print('✅ playwright_user_data zipped via Python')
          PY
            gpg --quiet --batch --yes --symmetric --passphrase "$GPG_PASSPHRASE" \
            --output playwright_user_data.zip.gpg playwright_user_data.zip
            echo "✅ Encrypted and prepared browser profile for cache"
          fi

      - name: Save Cache
        if: steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            worker_data.json.gpg
            playwright_user_data.zip.gpg
          key: persistent-data-v1-${{ github.run_number }}

      - name: Cleanup Old Caches
        if: steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching list of old caches to prevent 10GB limit exhaustion..."
          gh api --paginate -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" repos/${{ github.repository }}/actions/caches > caches.json
          
          echo "Cleaning up caches older than 2 days..."
          
          # Delete caches created more than 2 days ago (172800 seconds)
          # We use split(".")[0] + "Z" to strip fractional seconds which cause jq fromdateiso8601 to fail
          jq -r '.actions_caches[]? | select((.created_at | split(".")[0] + "Z" | fromdateiso8601) < (now - 172800)) | .id' caches.json | tr -d '\r' | while read cache_id; do
            if [ -n "$cache_id" ]; then
              echo "Deleting old cache ID $cache_id (older than 2 days)..."
              gh api --method DELETE -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" repos/${{ github.repository }}/actions/caches/$cache_id || true
            fi
          done

      - name: Log run outcome to Discord (LOGS_WEBHOOK_URL)
        if: always() && steps.check_skip.outputs.should_skip != 'true' && steps.checkpause.outputs.paused != 'true'
        continue-on-error: true
        env:
          LOGS_WEBHOOK_URL: ${{ secrets.LOGS_WEBHOOK_URL }}
          RUN_STATUS: ${{ steps.parse.outputs.status }}
          RUN_REASON: ${{ steps.parse.outputs.reason }}
          WAIT_HOURS: ${{ steps.parse.outputs.wait_hours }}
          RUN_NUMBER: ${{ github.run_number }}
          JOB_STATUS: ${{ job.status }}
          STEP_ENCRYPT: ${{ steps.encrypt_cache.outcome }}
          STEP_WORKER: ${{ steps.run_worker.outcome }}
        run: |
          python - <<'PY'
          import os, requests
          url = os.environ.get('LOGS_WEBHOOK_URL', '').strip()
          if not url:
              print('LOGS_WEBHOOK_URL not set — skipping Discord notification.')
              exit(0)
          script_status = os.environ.get('RUN_STATUS',  'unknown').strip() or 'unknown'
          reason        = os.environ.get('RUN_REASON',  'unknown').strip() or 'unknown'
          wait_h        = os.environ.get('WAIT_HOURS',  '0').strip() or '0'
          run_num       = os.environ.get('RUN_NUMBER',  '?').strip()
          job_status    = os.environ.get('JOB_STATUS',  'unknown').strip()
          step_encrypt  = os.environ.get('STEP_ENCRYPT', '').strip()
          step_worker   = os.environ.get('STEP_WORKER',  '').strip()

          # Detect workflow-level failures (steps that errored regardless of script outcome)
          failed_steps = []
          if step_encrypt and step_encrypt not in ('success', 'skipped'):
              failed_steps.append(f'encrypt_cache={step_encrypt}')
          if step_worker and step_worker not in ('success', 'skipped'):
              failed_steps.append(f'worker_script={step_worker}')

          if failed_steps or job_status not in ('success', 'cancelled'):
              # Workflow-level error — report this loudly regardless of script status
              icon = '🔴'
              failures_str = ', '.join(failed_steps) if failed_steps else f'job={job_status}'
              msg = (f'{icon} Run #{run_num} — WORKFLOW ERROR | '
                     f'Failed steps: {failures_str} | '
                     f'Script status: {script_status} | Reason: {reason}')
          elif script_status == 'completed':
              icon = '✅'
              msg = f'{icon} Run #{run_num} finished | Status: {script_status} | Reason: {reason}'
          elif script_status == 'limited_sleep':
              icon = '🚫'
              msg = f'{icon} Run #{run_num} sleeping | Reason: {reason}'
              if wait_h not in ('0', '', 'none'):
                  msg += f' | ⏸️ Pausing for {wait_h}h'
          else:
              icon = '⚠️'
              msg = f'{icon} Run #{run_num} finished | Status: {script_status} | Reason: {reason}'

          try:
              r = requests.post(url, json={'content': msg}, timeout=10)
              print(f'Discord notified: {r.status_code} — {msg}')
          except Exception as e:
              print(f'Discord notify failed (non-fatal): {e}')
          PY

      - name: Log paused run to Discord (LOGS_WEBHOOK_URL)
        if: always() && steps.checkpause.outputs.paused == 'true'
        continue-on-error: true
        env:
          LOGS_WEBHOOK_URL: ${{ secrets.LOGS_WEBHOOK_URL }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import os, requests
          url = os.environ.get('LOGS_WEBHOOK_URL', '').strip()
          if not url:
              print('LOGS_WEBHOOK_URL not set — skipping Discord notification.')
              exit(0)
          run_num = os.environ.get('RUN_NUMBER', '?').strip()
          msg = f'⏸️ Run #{run_num} skipped — still within pause window (PAUSE_UNTIL not elapsed).'
          try:
              r = requests.post(url, json={'content': msg}, timeout=10)
              print(f'Discord notified: {r.status_code}')
          except Exception as e:
              print(f'Discord notify failed (non-fatal): {e}')
          PY
